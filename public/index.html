    <style>
      #sales-notification {

        box-shadow: 0 4px 15px rgba(0,0,0,0.1);

      }
      #sales-notification.show {
        opacity: 1;
        transform: translateY(0);
      }
      .sn-icon-wrapper {
        background-color: #fbbf24;
        width: 40px;

      .sn-title {

        font-size: 14px;
        font-weight: 700;
        color: #111827;
        line-height: 1.2;
      }
      .sn-subtitle {
        margin: 0;
        font-size: 13px;
        color: #6b7280;
        line-height: 1.2;

      }
      @media (max-width: 600px) {

    <div id="sales-notification">

      </div>

        <p class="sn-subtitle">acabou de garantir o <span id="sn-product"></span></p>
      </div>
    </div>
    <script>
      (function() {
        const buyers = ["Carlos Mendes", "Ana Silva", "Marcos Oliveira", "Julia Costa", "Fernando Santos", "Rafael Lima", "Mariana Souza", "Pedro Alves", "João Pedro", "Lucas Gabriel", "Mateus Henrique", "Luiz Felipe", "Letícia", "Amanda"];
        const locations = ["Fortaleza, CE", "São Paulo, SP", "Rio de Janeiro, RJ", "Belo Horizonte, MG", "Curitiba, PR", "Salvador, BA", "Recife, PE", "Porto Alegre, RS", "Brasília, DF", "Goiânia, GO", "Manaus, AM", "Belém, PA", "Campinas, SP", "São Luís, MA"];
        const products = ["Pacote Completo", "Acesso VIP", "Plano Anual", "Combo Especial"];
        
        function getRandomItem(arr) {
          return arr[Math.floor(Math.random() * arr.length)];
        }
        
        function showNotification() {
          document.getElementById('sn-name').textContent = getRandomItem(buyers);
          document.getElementById('sn-location').textContent = getRandomItem(locations);
          document.getElementById('sn-product').textContent = getRandomItem(products);
          
          const notif = document.getElementById('sales-notification');
          notif.classList.add('show');
          
          setTimeout(() => {
            notif.classList.remove('show');
            scheduleNextNotification();
          }, 5000);
        }
        
        function scheduleNextNotification() {
          const delays = [15000, 20000, 25000];
          const delay = delays[Math.floor(Math.random() * delays.length)];
          setTimeout(showNotification, delay);
        }
        
        setTimeout(showNotification, 5000);
      })();
    </script>
